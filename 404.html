<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>Page Not Found | Align &amp; Scale Solutions</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon-192x192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0C2340">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="navbar-brand" aria-label="Align & Scale Solutions Home">
        <img src="images/logo.png" alt="Align & Scale Solutions logo" width="44" height="44">
        <span class="navbar-brand-text">Align <span>&amp;</span> Scale</span>
      </a>
      <div class="nav-links" id="navLinks" role="menubar">
        <a href="index.html" role="menuitem">Home</a>
        <a href="about.html" role="menuitem">About</a>
        <a href="services.html" role="menuitem">Services</a>
        <a href="experience.html" role="menuitem">Experience</a>
        <a href="contact.html" class="nav-cta" role="menuitem">Contact Us</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- 404 -->
  <section class="section">
    <div class="container">
      <div class="error-page">
        <div>
          <h1>404</h1>
          <p>The page you are looking for does not exist or has been moved.</p>
          <a href="index.html" class="btn btn-primary">Return to Home</a>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2026 Align &amp; Scale Solutions. All rights reserved.</p>
        <div class="footer-bottom-links">
          <a href="privacy.html">Privacy Policy</a>
          <a href="terms.html">Terms of Use</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    (function() {
      var hamburger = document.getElementById('hamburger');
      var navLinks = document.getElementById('navLinks');

      hamburger.addEventListener('click', function() {
        var expanded = hamburger.getAttribute('aria-expanded') === 'true';
        hamburger.setAttribute('aria-expanded', String(!expanded));
        navLinks.classList.toggle('active');
        document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
      });

      navLinks.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
          navLinks.classList.remove('active');
          hamburger.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        });
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && navLinks.classList.contains('active')) {
          navLinks.classList.remove('active');
          hamburger.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
          hamburger.focus();
        }
      });
    })();
  </script>
</body>
</html>
